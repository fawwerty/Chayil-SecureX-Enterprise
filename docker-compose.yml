version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: csx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chayil_securex
      POSTGRES_USER: chayil
      POSTGRES_PASSWORD: chayil_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chayil -d chayil_securex"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - csx_network

  redis:
    image: redis:7-alpine
    container_name: csx_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - csx_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: csx_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chayil_securex
      DB_USER: chayil
      DB_PASS: chayil_secret
      REDIS_URL: redis://redis:6379
      JWT_SECRET: chayil_securex_jwt_secret_key_2024_change_in_production
      JWT_EXPIRES_IN: 24h
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASS: ""
      SITE_EMAIL: info@chayilsecurex.com
      ABUSEIPDB_API_KEY: ""
      VIRUSTOTAL_API_KEY: ""
      ALLOWED_ORIGINS: "http://localhost,http://localhost:5173,http://localhost:3000,http://localhost:3001"
      RATE_LIMIT_MAX: "200"
      SCAN_RATE_LIMIT_MAX: "50"
      SCAN_TIMEOUT: "300"
      USE_DOCKER: "false"
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - backend_logs:/app/logs
    networks:
      - csx_network
      - isolated_scan

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: csx_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - csx_network

  mobile:
    image: nginx:alpine
    container_name: csx_mobile
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./mobile:/usr/share/nginx/html:ro
      - ./docker/nginx-mobile.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - csx_network

networks:
  csx_network:
    driver: bridge
  isolated_scan:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  backend_logs:
